<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Halo, Sehat!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Daftar Akun</h2>
            <p class="text-muted small">Silakan daftar untuk mulai konsultasi</p>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label for="nama" class="form-label fw-semibold" style="font-size: 0.9rem;">Nama Lengkap</label>
                <input type="text" class="form-control" id="nama" placeholder="Nama lengkap Anda" required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold" style="font-size: 0.9rem;">Email</label>
                <input type="email" class="form-control" id="email" placeholder="email@contoh.com" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold" style="font-size: 0.9rem;">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Minimal 8 karakter" required>
            </div>

            <div class="mb-4">
                <label for="confirm" class="form-label fw-semibold" style="font-size: 0.9rem;">Konfirmasi Password</label>
                <input type="password" class="form-control" id="confirm" placeholder="Ulangi password" required>
            </div>

            <button type="submit" class="btn btn-auth w-100 mb-3">Daftar Sekarang</button>
            
            <div class="text-center text-muted" style="font-size: 0.85rem;">
                Sudah punya akun? <a href="login.html">Masuk Sekarang</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
