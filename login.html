<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Halo, Sehat!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold">Halo, Sehat!</h3>
            <p class="text-muted small">Silakan masuk untuk mulai konsultasi</p>
        </div>
        
        <form onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div class="mb-3">
                <label class="form-label fw-semibold" style="font-size: 0.9rem;">Email</label>
                <input type="email" class="form-control" placeholder="Masukkan email kamu" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold" style="font-size: 0.9rem;">Password</label>
                <input type="password" class="form-control" placeholder="Masukkan password" required>
            </div>  
            <button type="submit" class="btn btn-auth w-100">Masuk</button>
        </form>     

        <p class="text-center mt-4 mb-0 text-muted" style="font-size: 0.875rem;">
            Belum punya akun? <a href="registrasi.html">Daftar sekarang</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
